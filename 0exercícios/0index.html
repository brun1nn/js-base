<!-- index.html -->
<button id="btn-buscar">Buscar Posts do Usuário 1</button>
<div id="resultado">Aguardando ação...</div>

<script>
  // Obtém referências no DOM
  const botao = document.querySelector('#btn-buscar');
  const resultado = document.querySelector('#resultado');

  // Função assíncrona que busca e exibe os posts
  async function buscarPosts() {
    try {
      // Chama a API (POSTS do usuário 1)
      const resposta = await fetch('https://jsonplaceholder.typicode.com/posts?userId=1');
      // Verifica se a resposta foi bem-sucedida (status HTTP ok)
      if (!resposta.ok) throw new Error(`Erro HTTP ${resposta.status}`);

      // Converte o corpo da resposta para JSON (é assíncrono)
      const posts = await resposta.json();

      // Limpa conteúdo anterior
      resultado.innerHTML = '';

      // Para cada post, cria um parágrafo e adiciona ao DOM
      posts.forEach(post => {
        const p = document.createElement('p');
        p.textContent = post.title;  // define o conteúdo de texto do parágrafo
        resultado.appendChild(p);
      });
    } catch (erro) {
      console.error('Erro ao buscar posts:', erro);
      resultado.textContent = 'Não foi possível carregar os posts.';
    }
  }

  // Configura o evento de clique do botão
  botao.addEventListener('click', buscarPosts);
</script>
